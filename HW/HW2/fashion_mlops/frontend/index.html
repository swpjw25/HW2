<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Fashion Evaluator</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-glow blob-1"></div>
    <div class="bg-glow blob-2"></div>
    
    <div class="container glass-panel">
        <header>
            <h1 class="gradient-text">K-Fashion Evaluator</h1>
            <p>Upload your outfit. Get AI-powered styling advice.</p>
        </header>

        <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*" hidden>
            <div id="upload-content">
                <div class="upload-icon">📸</div>
                <h3>Drag & Drop your outfit photo</h3>
                <p>or click to browse from your device</p>
            </div>
            <img id="image-preview" src="" alt="Outfit Preview" style="display: none;">
        </div>
        
        <button id="evaluate-btn" class="btn-primary" disabled>
            <span>✨ Evaluate Style ✨</span>
            <div class="spinner" id="btn-spinner"></div>
        </button>

        <div id="results-panel" class="results-panel hidden">
            <div class="score-container">
                <div class="score-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                      <path class="circle-bg"
                        d="M18 2.0845
                          a 15.9155 15.9155 0 0 1 0 31.831
                          a 15.9155 15.9155 0 0 1 0 -31.831"
                      />
                      <path class="circle" id="score-circle-path"
                        stroke-dasharray="0, 100"
                        d="M18 2.0845
                          a 15.9155 15.9155 0 0 1 0 31.831
                          a 15.9155 15.9155 0 0 1 0 -31.831"
                      />
                    </svg>
                    <div class="score-value" id="score-value">0</div>
                </div>
                <div class="score-label">Style Score</div>
            </div>

            <div class="feedback-container">
                <h3>Vibe & Feedback</h3>
                <p id="feedback-text"></p>
            </div>

            <div class="improvements-container">
                <h3>Pro Tips</h3>
                <ul id="improvements-list">
                    <!-- Points injected via JS -->
                </ul>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
