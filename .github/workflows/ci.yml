name: Fashion MLOps CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./HW/HW2/fashion_mlops
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fashion-mlops:latest
        platforms: linux/amd64,linux/arm64

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Pull latest image
      run: docker pull ${{ secrets.DOCKER_USERNAME }}/fashion-mlops:latest

    - name: Stop and remove existing container
      run: |
        docker stop fashion-mlops-app || true
        docker rm fashion-mlops-app || true

    - name: Run new container
      run: |
        docker run -d \
          --name fashion-mlops-app \
          -p 8000:8000 \
          ${{ secrets.DOCKER_USERNAME }}/fashion-mlops:latest
