name: Fashion MLOps CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    # 앞에서 설정한 self-hosted runner 위에서 동작하도록 지정
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      working-directory: ./HW/HW2/fashion_mlops
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build / Test
      working-directory: ./HW/HW2/fashion_mlops
      run: |
        echo "CI 빌드 테스트 성공! (여기에 테스트 코드나 배포 스크립트를 추가할 수 있습니다.)"
